services:
  - type: web
    name: aura-backend
    runtime: docker
    rootDir: backend
    plan: free
    autoDeploy: true
    healthCheckPath: /api/catalog
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: dev

  - type: web
    name: aura-frontend
    runtime: node
    rootDir: frontend
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm run start -- -p $PORT -H 0.0.0.0
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
      - key: NEXT_PUBLIC_API_BASE_URL
        sync: false
